<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbff" />
    <meta name="description" content="모바일 청첩장" />
    <meta property="og:title" content="모바일 청첩장" />
    <meta property="og:description" content="소중한 날에 초대합니다." />
    <meta property="og:image" content="assets/intro.jpg" />
    <title>모바일 청첩장</title>
    <link rel="preconnect" href="https://use.typekit.net" />
    <link rel="stylesheet" href="https://use.typekit.net/mvm3pnb.css" />
    <link rel="stylesheet" href="styles.css?v=20260603-unified-intro-font" />
    <script type="module" src="scripts/main.js?v=20260601-fiona-date"></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__frame">
          <h1 id="hero-title">Save the Date</h1>
          <p class="hero__name hero__name--top" data-field="groomUpper"></p>
          <p class="hero__amp" aria-hidden="true">&amp;</p>
          <p class="hero__name hero__name--bottom" data-field="brideUpper"></p>
          <figure class="hero__photo-frame">
            <img class="hero__photo" src="assets/intro.jpg" alt="민석과 민주의 웨딩 사진" />
          </figure>
          <div class="hero__date-line" aria-label="예식일">
            <span data-field="heroYear"></span>
            <span data-field="heroDate"></span>
            <span data-field="heroTime"></span>
          </div>
          <p class="hero__venue" data-field="venueUpper"></p>
        </div>
      </section>

      <section class="intro section">
        <p class="kicker">Invitation</p>
        <div class="message" data-list="message"></div>
        <div class="families">
          <p data-field="groomParents"></p>
          <p data-field="brideParents"></p>
        </div>
      </section>

      <section class="section timeline">
        <p class="kicker">Wedding Day</p>
        <h2 data-field="calendarDate"></h2>
        <p data-field="timeLeft"></p>
        <div class="action-row">
          <a class="button" data-action="calendar" href="#">일정 저장</a>
          <button class="button button--ghost" type="button" data-action="share">공유</button>
        </div>
      </section>

      <section class="section venue">
        <p class="kicker">Location</p>
        <h2 data-field="venue"></h2>
        <p data-field="hall"></p>
        <p class="address" data-field="address"></p>
        <p class="address-detail" data-field="addressDetail"></p>
        <p class="address-detail" data-field="transit"></p>
        <div class="action-row">
          <a class="button" data-field-link="mapUrl" target="_blank" rel="noreferrer">지도 열기</a>
          <a class="button button--ghost" data-action="copyAddress" href="#">주소 복사</a>
        </div>
      </section>

      <section class="section contacts">
        <p class="kicker">Contact</p>
        <div class="contact-grid">
          <a data-call="groom">신랑에게 연락</a>
          <a data-call="bride">신부에게 연락</a>
          <a data-call="groomFather">신랑측 혼주</a>
          <a data-call="brideFather">신부측 혼주</a>
        </div>
      </section>

      <section class="section accounts">
        <button class="section-toggle" type="button" aria-expanded="false" data-action="toggleAccounts">
          <span>마음 전하실 곳</span>
          <span aria-hidden="true">+</span>
        </button>
        <div class="account-list" data-list="accounts" hidden></div>
      </section>

      <section class="section rsvp" data-rsvp>
        <p class="kicker">RSVP</p>
        <h2>참석 의사를 알려주세요</h2>
        <form class="rsvp-form">
          <label>
            이름
            <input name="name" autocomplete="name" required />
          </label>
          <label>
            참석 여부
            <select name="attendance" required>
              <option value="참석">참석</option>
              <option value="불참">불참</option>
            </select>
          </label>
          <label>
            동행 인원
            <input name="guests" type="number" min="0" max="9" value="0" />
          </label>
          <label>
            메모
            <textarea name="memo" rows="3"></textarea>
          </label>
          <button class="button" type="submit">전송</button>
        </form>
      </section>
    </main>
    <div class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
