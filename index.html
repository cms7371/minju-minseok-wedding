<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbff" />
    <meta name="description" content="모바일 청첩장" />
    <meta property="og:title" content="모바일 청첩장" />
    <meta property="og:description" content="소중한 날에 초대합니다." />
    <meta property="og:image" content="assets/intro.jpg" />
    <title>모바일 청첩장</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://use.typekit.net" />
    <link rel="preconnect" href="https://assets.minju-minseok-wedding.life" />
    <link rel="preload" href="assets/fonts/gowun-batang-subset.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/mvm3pnb.css" />
    <link rel="stylesheet" href="styles.css?v=20260609-calendar-title-1" />
    <script type="module" src="scripts/main.js?v=20260609-hero-calendar-1"></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__frame">
          <h1 id="hero-title">Save the Date</h1>
          <p class="hero__name hero__name--top" data-field="groomUpper"></p>
          <p class="hero__amp" aria-hidden="true">&amp;</p>
          <p class="hero__name hero__name--bottom" data-field="brideUpper"></p>
          <figure class="hero__photo-frame">
            <img class="hero__photo" src="assets/intro.jpg" alt="민석과 민주의 웨딩 사진" />
          </figure>
          <div class="hero__date-line" aria-label="예식일">
            <span data-field="heroYear"></span>
            <span data-field="heroDate"></span>
            <span data-field="heroTime"></span>
          </div>
          <p class="hero__venue" data-field="venueUpper"></p>
        </div>
      </section>

      <section class="intro section">
        <p class="kicker">Invitation</p>
        <div class="message" data-list="message"></div>
        <div class="families">
          <p data-field="groomParents"></p>
          <p data-field="brideParents"></p>
        </div>
      </section>

      <section class="section gallery">
        <p class="kicker">Gallery</p>
        <div class="gallery-grid" data-list="gallery"></div>
      </section>

      <section class="section timeline">
        <p class="kicker">Wedding Day</p>
        <div class="calendar-card" data-calendar aria-label="예식 달력"></div>
        <a class="button calendar-save-button" data-action="calendar" href="assets/minseok-minju-wedding.ics">캘린더에 추가</a>
      </section>

      <section class="section venue">
        <p class="kicker">Location</p>
        <h2 data-field="venue"></h2>
        <p class="address" data-field="address"></p>
        <p class="address-detail" data-field="addressDetail"></p>
        <p class="address-detail" data-field="transit"></p>
        <div class="map-card">
          <div class="naver-map" data-map-embed role="img" aria-label="르비르모어 지도"></div>
        </div>
        <div class="map-link-grid" data-list="mapLinks"></div>
        <button class="button button--ghost address-copy-button" type="button" data-action="copyAddress">주소 복사</button>
      </section>

      <section class="section contacts">
        <p class="kicker">Contact</p>
        <div class="contact-list" data-list="contacts"></div>
        <div class="account-list" data-list="accounts"></div>
      </section>
    </main>
    <div class="gallery-lightbox" data-gallery-lightbox hidden>
      <button class="gallery-lightbox__button gallery-lightbox__button--close" type="button" data-action="closeGallery" aria-label="갤러리 닫기">×</button>
      <button class="gallery-lightbox__button gallery-lightbox__button--prev" type="button" data-action="prevGallery" aria-label="이전 사진">‹</button>
      <figure class="gallery-lightbox__figure">
        <img data-gallery-lightbox-image alt="" />
        <figcaption data-gallery-lightbox-caption></figcaption>
      </figure>
      <button class="gallery-lightbox__button gallery-lightbox__button--next" type="button" data-action="nextGallery" aria-label="다음 사진">›</button>
    </div>
    <div class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
